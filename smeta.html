<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Смета 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }

  .header { background: #1a2b4a; color: #fff; padding: 12px 16px 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .tier-row { display: flex; gap: 6px; }
  .tier-btn { flex: 1; padding: 8px 4px; border: 2px solid rgba(255,255,255,.3); background: transparent; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; position: relative; }
  .tier-btn.active { background: #f59e0b; border-color: #f59e0b; color: #1a1a1a; }
  .tier-btn.auto-flash { animation: flash .4s ease; }
  @keyframes flash { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); box-shadow: 0 0 0 3px rgba(245,158,11,.5); } }
  .tier-auto-badge { position: absolute; top: -6px; right: -4px; background: #10b981; color: #fff; font-size: 9px; padding: 1px 4px; border-radius: 4px; font-weight: 700; }

  .total-bar { background: #0f1f38; color: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
  .total-main { flex: 1; }
  .total-label { font-size: 12px; opacity: .7; }
  .total-value { font-size: 26px; font-weight: 800; color: #34d399; line-height: 1.1; }
  .total-actions { display: flex; gap: 6px; }
  .t-btn { background: rgba(255,255,255,.12); border: none; color: #fff; padding: 7px 10px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .t-btn:active { background: rgba(255,255,255,.22); }
  .t-btn.danger { background: rgba(239,68,68,.25); }

  .search-wrap { padding: 10px 12px; background: #fff; border-bottom: 1px solid #e5e7eb; }
  .search-input { width: 100%; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 16px; outline: none; }
  .search-input:focus { border-color: #3b82f6; }

  .estimate-section { background: #fff; margin: 8px; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .estimate-header { padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e5e7eb; font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; }
  .est-item { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid #f3f4f6; gap: 8px; }
  .est-item:last-child { border-bottom: none; }
  .est-item-info { flex: 1; min-width: 0; }
  .est-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .est-item-detail { font-size: 12px; color: #6b7280; margin-top: 1px; }
  .est-item-total { font-size: 15px; font-weight: 700; color: #1d4ed8; white-space: nowrap; }
  .est-item-del { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .est-transport { background: #fefce8; }
  .est-transport .est-item-name { color: #92400e; }
  .est-transport .est-item-total { color: #92400e; }

  .items-section { margin: 8px; }
  .cat-header { padding: 8px 4px 4px; font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .6px; }
  .item-card { background: #fff; border-radius: 10px; margin-bottom: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .item-row { display: flex; align-items: center; padding: 12px 14px; cursor: pointer; gap: 10px; }
  .item-row:active { background: #f8fafc; }
  .item-name { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.3; }
  .item-price { font-size: 15px; font-weight: 700; color: #1d4ed8; white-space: nowrap; }
  .item-unit { font-size: 11px; color: #9ca3af; font-weight: 400; }
  .item-chevron { color: #d1d5db; font-size: 16px; transition: transform .2s; }
  .item-chevron.open { transform: rotate(90deg); }
  .item-expand { display: none; padding: 0 14px 14px; background: #f8fafc; border-top: 1px solid #f0f0f0; }
  .item-expand.show { display: block; }
  .item-notes { font-size: 11px; color: #6b7280; margin-bottom: 10px; padding-top: 8px; line-height: 1.4; }
  .expand-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .expand-field { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 80px; }
  .expand-field label { font-size: 11px; color: #6b7280; font-weight: 600; }
  .expand-field input { padding: 9px 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; outline: none; width: 100%; }
  .expand-field input:focus { border-color: #3b82f6; }
  .add-btn { background: #1d4ed8; color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; margin-top: auto; }
  .add-btn:active { background: #1e40af; }
  .fixed-price-tag { font-size: 11px; color: #d97706; background: #fef3c7; padding: 3px 7px; border-radius: 5px; margin-bottom: 8px; display: inline-block; }
  .auto-tier-hint { font-size: 11px; color: #10b981; font-weight: 700; margin-top: 5px; display: none; }

  .no-results { text-align: center; padding: 30px 16px; color: #9ca3af; font-size: 15px; }
  .pb { height: 20px; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a2b4a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; transition: transform .3s; z-index: 999; pointer-events: none; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">🧮 Смета 2026</div>
    <div style="font-size:11px;opacity:.5">авто-тариф ✓</div>
  </div>
  <div class="tier-row">
    <button class="tier-btn active" id="tier0" data-tier="0" onclick="setTier(0,true)">≤ 30 м</button>
    <button class="tier-btn" id="tier1" data-tier="1" onclick="setTier(1,true)">30–60 м</button>
    <button class="tier-btn" id="tier2" data-tier="2" onclick="setTier(2,true)">&gt; 60 м</button>
  </div>
</div>

<div class="total-bar">
  <div class="total-main">
    <div class="total-label">ИТОГО</div>
    <div class="total-value" id="totalVal">0 ₽</div>
  </div>
  <div class="total-actions">
    <button class="t-btn" onclick="roundTotal()" title="Округлить до тысячи">≈ 1к</button>
    <button class="t-btn" onclick="copyEstimate()">📋 Копировать</button>
    <button class="t-btn danger" onclick="clearEstimate()">Сброс</button>
  </div>
</div>

<div class="search-wrap">
  <input class="search-input" type="search" placeholder="🔍 Поиск позиции..." id="searchInput" oninput="filterItems()" autocomplete="off">
</div>

<div class="estimate-section" id="estimateSection" style="display:none">
  <div class="estimate-header">📋 Добавлено в смету</div>
  <div id="estimateList"></div>
</div>

<div class="items-section" id="itemsSection"></div>
<div class="pb"></div>
<div id="toast"></div>

<script>
const TIERS = ['до 30 м', '30–60 м', '60+ м'];
const TRANSPORT = 18000;
let currentTier = 0;
let estimate = [];
let expandedId = null;
let roundedOffset = 0;

const categories = [
  { name: "Заборы", items: [
    { id:'z1', name:"Забор из профнастила (Односторонний)", prices:[4000,3900,3700], unit:"пог.м", notes:"Окрас каркаса: Dali – 600 / Колировка – 1 200. Столбы (щебень) +500, лок.бетон до 1200мм – 690, до 1500мм – 1 000." },

    { id:'z3', name:"Забор Ранчо (Глянец 2м, 7024)", prices:[13000,12500,12000], unit:"пог.м" },
    { id:'z4', name:"Штакетник Рядный Односторонний, ст.60х60", prices:[4500,4350,4200], unit:"пог.м", notes:"М-профиль. П или ПД +100 руб/пог.м." },
    { id:'z5', name:"Штакетник Рядный Двухсторонний, ст.60х60", prices:[4900,4750,4500], unit:"пог.м" },
    { id:'z6', name:"Штакетник Шахматка Двухсторонний, ст.60х60", prices:[6900,6750,6500], unit:"пог.м", notes:"Ст.80х80 +1 000. Толщина 0.5 +1 000." },

    { id:'z8', name:"Забор из сетки рабица", prices:[2800,2500,2500], unit:"пог.м", notes:"Протяжка 1 ряд +200 руб." },
    { id:'z9', name:"Забор деревянный (Сосна 140)", prices:[6300,6000,5700], unit:"пог.м", notes:"Покраска (без ремонта и краски) +2 000 руб." },
    { id:'z10', name:"Забор жалюзи классик", prices:[8300,8000,7700], unit:"пог.м" },
    { id:'z11', name:"Забор из поликарбоната (сотовый 8мм)", prices:[4200,4000,3800], unit:"пог.м" },
    { id:'z12', name:"Защитная декоративная планка на забор", prices:[500,500,500], unit:"пог.м" },
  ]},
  { name: "Ворота и калитки", items: [
    { id:'v1', name:"Ворота откатные 1,90×4,20 (Сваи) — Профлист / штакет / сетка", fixedText:"Мех. 120 000 ₽ / Авт. 170 000 ₽", unit:"шт.", notes:"Фундамент монолитный (тумба) +50 000. Пульт +3 000." },
    { id:'v2', name:"Ворота откатные 1,90×4,20 (Сваи) — Жалюзи / Ранчо", fixedText:"Мех. 160–170 тыс. / Авт. 200–210 тыс.", unit:"шт.", notes:"Пульт +3 000 руб." },
    { id:'v3', name:"Ворота распашные 1,90×4,20 (Сваи) — Профлист / штакет", fixedText:"Мех. 35 000 ₽ / Авт. 60 000 ₽", unit:"шт." },
    { id:'v4', name:"Калитка — Профлист / штакет / сетка", prices:[32000,32000,32000], unit:"шт." },
    { id:'v5', name:"Калитка — Жалюзи / Ранчо", fixedText:"35 000 ₽ / 40 000 ₽", unit:"шт." },
  ]},
  { name: "Фундаменты и столбы", items: [
    { id:'f1', name:"Монолитный ленточный фундамент 600мм", prices:[11000,10000,9000], unit:"пог.м" },
    { id:'f2', name:"Свайно-винтовой фундамент", prices:[6000,5800,5500], unit:"пог.м" },
    { id:'f3', name:"Монолитные квадратные столбы 40×40, 2м", prices:[40000,40000,40000], unit:"шт." },
    { id:'f4', name:"Кирпичные столбы 2м (наш кирпич)", prices:[35000,35000,35000], unit:"шт." },
    { id:'f5', name:"Кирпичные столбы 2м (кирпич заказчика)", prices:[25000,25000,25000], unit:"шт." },
    { id:'f6', name:"Кирпичная кладка между столбами (1 ряд, с 2 сторон)", prices:[1500,1500,1500], unit:"пог.м" },
    { id:'f7', name:"Колпаки на столбы", prices:[3000,3000,3000], unit:"шт." },
    { id:'f8', name:"Отливы на фундамент", prices:[1500,1500,1500], unit:"пог.м" },
  ]},
  { name: "Отмостки, площадки, дорожки", items: [
    { id:'o1', name:"Мягкая отмостка / площадка / дорожка", prices:[3500,3000,2800], unit:"кв.м" },
    { id:'o2', name:"Бетонная 10см (сетка 5мм)", prices:[8000,6000,5500], unit:"кв.м" },
    { id:'o3', name:"Бетонная 10см (арматура d10, 1 ряд)", prices:[7500,7000,7000], unit:"кв.м" },
    { id:'o4', name:"Бетонная 15см (арматура d10, 1 ряд)", prices:[9500,8500,8200], unit:"кв.м" },
    { id:'o5', name:"Бетонная 15см (арматура d10, 2 ряда)", prices:[10000,9500,9300], unit:"кв.м" },
    { id:'o6', name:"Мощение плиткой на готовое основание", prices:[2500,2500,2500], unit:"кв.м" },
    { id:'o7', name:"Бордюрный камень (установка)", prices:[1300,1200,1200], unit:"пог.м" },
  ]},
  { name: "Дренаж и ливневка", items: [
    { id:'d1', name:"Поверхностный дренаж — Щебень", prices:[5500,5000,5000], unit:"пог.м", notes:"Дождеприёмник +6 500–7 500. Смотровой колодец +7 000–8 000. Дренажный колодец 3м +35–50 тыс. Врезка +2 500." },
    { id:'d2', name:"Поверхностный дренаж — Песок", prices:[3200,2800,2800], unit:"пог.м" },
    { id:'d3', name:"Поверхностный дренаж — Земля", prices:[2500,2200,2200], unit:"пог.м" },
    { id:'d4', name:"Ливневая канализация", prices:[1700,1500,1500], unit:"пог.м" },
    { id:'d5', name:"Въезд через дренажную канаву (Ш 1,20м)", prices:[13000,12000,10000], unit:"шт." },
    { id:'d6', name:"Въезд через дренажную канаву с бетонированием русла", prices:[13000,12000,10000], unit:"шт." },
  ]},
  { name: "Газон", items: [
    { id:'g1', name:"Газон рулонный", prices:[1200,1000,1000], unit:"кв.м" },
    { id:'g2', name:"Газон посевной", prices:[900,700,700], unit:"кв.м" },
  ]},
  { name: "Утепление (площадки, дорожки)", items: [
    { id:'u1', name:"Плантер", prices:[600,450,450], unit:"кв.м" },
    { id:'u2', name:"Плантер + Утеплитель 50мм", prices:[1800,1550,1500], unit:"кв.м" },
    { id:'u3', name:"Утеплитель 50мм", prices:[1200,1100,1000], unit:"кв.м" },
  ]},
  { name: "Навесы", items: [
    { id:'n1', name:"Навес — Профлист", prices:[10500,10000,9500], unit:"кв.м" },
    { id:'n2', name:"Навес — Металлочерепица", prices:[11500,11000,10500], unit:"кв.м" },
    { id:'n3', name:"Навес — Мягкая черепица", prices:[12500,12000,11500], unit:"кв.м" },
    { id:'n4', name:"Навес — Поликарбонат сотовый", prices:[10500,10000,9500], unit:"кв.м" },
  ]},
];

// ---- TIER ----
function getTierByQty(qty) {
  if (qty <= 30) return 0;
  if (qty <= 60) return 1;
  return 2;
}

function setTier(t, manual) {
  currentTier = t;
  document.querySelectorAll('.tier-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.tier === t);
    b.querySelector('.tier-auto-badge') && b.querySelector('.tier-auto-badge').remove();
  });
  if (!manual) {
    const btn = document.getElementById('tier' + t);
    const badge = document.createElement('span');
    badge.className = 'tier-auto-badge';
    badge.textContent = 'авто';
    btn.appendChild(badge);
    btn.classList.add('auto-flash');
    setTimeout(() => btn.classList.remove('auto-flash'), 500);
    // Update prices in-place without re-rendering the list
    updateVisiblePrices();
  } else {
    renderItems(document.getElementById('searchInput').value);
  }
  recalcEstimatePrices();
}

function updateVisiblePrices() {
  // Update all visible price labels and readonly price fields
  for (const cat of categories) {
    for (const item of cat.items) {
      if (!item.prices) continue;
      const price = item.prices[currentTier];
      const label = document.getElementById('itempr_' + item.id);
      if (label) label.textContent = price.toLocaleString('ru-RU') + ' ₽';
      const field = document.getElementById('pshow_' + item.id);
      if (field) field.value = price.toLocaleString('ru-RU') + ' ₽';
    }
  }
}

function recalcEstimatePrices() {
  estimate.forEach(e => {
    const item = findItem(e.itemId);
    if (item && item.prices) {
      e.price = item.prices[currentTier];
      e.tier = TIERS[currentTier];
    }
  });
  renderEstimate();
  updateTotal();
}

// ---- ESTIMATE ----
function addToEstimate(itemId) {
  const item = findItem(itemId);
  if (!item) return;
  const qInput = document.getElementById('qty_' + itemId);
  const pInput = document.getElementById('price_' + itemId);
  const qty = parseFloat(qInput.value);
  if (!qty || qty <= 0) { qInput.focus(); qInput.style.borderColor='#ef4444'; setTimeout(()=>qInput.style.borderColor='',800); return; }

  let price;
  if (item.prices) {
    price = item.prices[currentTier];
  } else {
    price = pInput ? parseFloat(pInput.value) : 0;
    if (!price || price <= 0) { if(pInput){pInput.focus(); pInput.style.borderColor='#ef4444'; setTimeout(()=>pInput.style.borderColor='',800);} return; }
  }

  estimate.push({ id: Date.now(), itemId, name: item.name, qty, price, unit: item.unit, tier: TIERS[currentTier] });
  qInput.value = '';
  if (pInput) pInput.value = '';
  roundedOffset = 0;
  collapseItem(itemId);
  save();
  renderEstimate();
  updateTotal();
}

function removeFromEstimate(eid) {
  estimate = estimate.filter(e => e.id !== eid);
  roundedOffset = 0;
  save();
  renderEstimate();
  updateTotal();
}

function clearEstimate() {
  if (estimate.length === 0) return;
  if (!confirm('Очистить смету?')) return;
  estimate = [];
  roundedOffset = 0;
  save();
  renderEstimate();
  updateTotal();
}

function calcTotal() {
  const base = estimate.reduce((s,e) => s + e.qty * e.price, 0);
  return base + (estimate.length > 0 ? TRANSPORT : 0) + roundedOffset;
}

function updateTotal() {
  document.getElementById('totalVal').textContent = fmt(calcTotal());
}

function roundTotal() {
  if (estimate.length === 0) return;
  const raw = estimate.reduce((s,e) => s + e.qty * e.price, 0) + TRANSPORT;
  const rounded = Math.ceil(raw / 1000) * 1000;
  roundedOffset = rounded - raw;
  updateTotal();
  showToast('Округлено до ' + fmt(rounded));
}

function copyEstimate() {
  if (estimate.length === 0) { showToast('Смета пуста'); return; }
  const tierLabel = TIERS[currentTier];
  let lines = [`Смета 2026 (${tierLabel})\n`];
  estimate.forEach(e => {
    lines.push(`• ${e.name}`);
    lines.push(`  ${e.qty} ${e.unit} × ${e.price.toLocaleString('ru-RU')} ₽ = ${fmt(e.qty * e.price)}`);
  });
  lines.push(`\n• Транспортные расходы = ${fmt(TRANSPORT)}`);
  lines.push(`\nИТОГО: ${fmt(calcTotal())}`);
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Скопировано!')).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Скопировано!');
  });
}

function renderEstimate() {
  const sec = document.getElementById('estimateSection');
  const list = document.getElementById('estimateList');
  if (estimate.length === 0) { sec.style.display='none'; list.innerHTML=''; return; }
  sec.style.display = 'block';
  let html = estimate.map(e => {
    const total = e.qty * e.price;
    return `<div class="est-item">
      <div class="est-item-info">
        <div class="est-item-name">${e.name}</div>
        <div class="est-item-detail">${e.qty} ${e.unit} × ${fmt(e.price)} (${e.tier})</div>
      </div>
      <div class="est-item-total">${fmt(total)}</div>
      <button class="est-item-del" onclick="removeFromEstimate(${e.id})">×</button>
    </div>`;
  }).join('');
  // Transport row
  html += `<div class="est-item est-transport">
    <div class="est-item-info">
      <div class="est-item-name">🚚 Транспортные расходы</div>
      <div class="est-item-detail">фиксированно</div>
    </div>
    <div class="est-item-total">${fmt(TRANSPORT)}</div>
    <div style="width:26px"></div>
  </div>`;
  list.innerHTML = html;
}

// ---- ITEMS ----
function findItem(id) {
  for (const cat of categories) {
    const item = cat.items.find(i => i.id === id);
    if (item) return item;
  }
  return null;
}

function collapseItem(id) {
  if (expandedId === id) expandedId = null;
  const exp = document.getElementById('exp_'+id);
  const chev = document.getElementById('chev_'+id);
  if (exp) exp.classList.remove('show');
  if (chev) chev.classList.remove('open');
}

function toggleItem(id) {
  const exp = document.getElementById('exp_'+id);
  const chev = document.getElementById('chev_'+id);
  if (!exp) return;
  const isOpen = exp.classList.contains('show');
  if (expandedId && expandedId !== id) collapseItem(expandedId);
  if (isOpen) { exp.classList.remove('show'); chev&&chev.classList.remove('open'); expandedId=null; }
  else { exp.classList.add('show'); chev&&chev.classList.add('open'); expandedId=id; setTimeout(()=>{ const q=document.getElementById('qty_'+id); if(q) q.focus(); },100); }
}

function onQtyInput(itemId, val) {
  const qty = parseFloat(val);
  if (!qty || qty <= 0) return;
  const item = findItem(itemId);
  // Auto-tier only for linear-meter items (фасад/периметр)
  if (item && item.unit === 'пог.м') {
    const newTier = getTierByQty(qty);
    if (newTier !== currentTier) {
      setTier(newTier, false);
      // update the readonly price field if visible
      const pField = document.getElementById('pshow_'+itemId);
      if (pField && item.prices) pField.value = item.prices[newTier].toLocaleString('ru-RU') + ' ₽';
    }
  }
}

function renderItems(query) {
  const q = (query||'').toLowerCase().trim();
  const sec = document.getElementById('itemsSection');
  let html = '';
  let anyResult = false;

  for (const cat of categories) {
    const items = cat.items.filter(item => !q || item.name.toLowerCase().includes(q));
    if (items.length === 0) continue;
    anyResult = true;
    html += `<div class="cat-header">${cat.name}</div>`;
    for (const item of items) {
      const price = item.prices ? item.prices[currentTier] : null;
      const isFixed = !item.prices;
      html += `<div class="item-card">
        <div class="item-row" onclick="toggleItem('${item.id}')">
          <div class="item-name">${item.name}</div>
          <div style="text-align:right">
            <div class="item-price" id="itempr_${item.id}">${price ? price.toLocaleString('ru-RU')+' ₽' : '—'}</div>
            <div class="item-unit">${item.unit}</div>
          </div>
          <span class="item-chevron" id="chev_${item.id}">›</span>
        </div>
        <div class="item-expand" id="exp_${item.id}">
          ${item.notes ? `<div class="item-notes">ℹ️ ${item.notes}</div>` : ''}
          ${isFixed ? `<div class="fixed-price-tag">💰 ${item.fixedText}</div>` : ''}
          <div class="expand-row">
            <div class="expand-field">
              <label>Кол-во / ${item.unit}</label>
              <input type="number" id="qty_${item.id}" placeholder="0" min="0" step="0.5" inputmode="decimal"
                oninput="onQtyInput('${item.id}', this.value)"
                onkeydown="if(event.key==='Enter') addToEstimate('${item.id}')">
            </div>
            ${isFixed
              ? `<div class="expand-field"><label>Цена, ₽</label>
                 <input type="number" id="price_${item.id}" placeholder="" inputmode="decimal"
                   onkeydown="if(event.key==='Enter') addToEstimate('${item.id}')"></div>`
              : `<div class="expand-field" style="flex:0 0 auto"><label>Цена за ед.</label>
                 <input type="text" id="pshow_${item.id}" value="${price ? price.toLocaleString('ru-RU')+' ₽' : ''}" readonly
                   style="background:#f3f4f6;color:#6b7280;width:110px"></div>`
            }
            <button class="add-btn" onclick="addToEstimate('${item.id}')">+ Добавить</button>
          </div>
        </div>
      </div>`;
    }
  }

  if (!anyResult) html = `<div class="no-results">Ничего не найдено по «${query}»</div>`;
  sec.innerHTML = html;
}

function filterItems() {
  expandedId = null;
  renderItems(document.getElementById('searchInput').value);
}

// ---- UTILS ----
function fmt(n) { return Math.round(n).toLocaleString('ru-RU') + ' ₽'; }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ---- PERSIST ----
function save() {
  try { localStorage.setItem('smeta2026', JSON.stringify({ estimate, tier: currentTier })); } catch(e){}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('smeta2026'));
    if (!d) return;
    estimate = d.estimate || [];
    if (d.tier !== undefined) { currentTier = d.tier; setTier(currentTier, true); }
  } catch(e){}
}

// ---- INIT ----
load();
renderItems('');
renderEstimate();
updateTotal();
</script>
</body>
</html>
